<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milnapath Future Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">MILNAPATH</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Shop</a></li>
                <li><a href="#">Categories</a></li>
            </ul>
            <div class="cart-icon">🛒 <span id="cart-count">0</span></div>
        </nav>
    </header>

    <section class="hero">
        <h1>Future of Shopping</h1>
        <p>Experience the next generation e-commerce.</p>
    </section>

    <section class="products">
        <div class="product-card">
            <img src="product1.jpg" alt="Product">
            <h3>Smart Device</h3>
            <p>$199.00</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        <!-- Add more product-cards here -->
    </section>

    <script src="script.js"></script>
</body>
</html>
